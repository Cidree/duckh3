url: https://cidree.github.io/duckh3/
template:
  # ── Written with Claude ──────────────────────────────────────────────────────
  bootstrap: 5
  bslib:
    # ── Palette ────────────────────────────────────────────────────────────────
    # Deep ink background with sharp teal-cyan accent — evokes water, maps,
    # and the precision of a database engine.
    bg:                 '#F8FAFB'   # near-white with a cool undertone
    fg:                 '#0D1B2A'   # deep navy ink
    primary:            '#0A7EA4'   # vivid teal — links, buttons, active states
    secondary:          '#FF6B35'   # burnt orange — badges, highlights
    success:            '#2CB67D'   # muted green
    info:               '#5B8DB8'   # mid steel blue
    warning:            '#F4A261'   # warm amber
    danger:             '#E63946'   # clear red

    # ── Navbar ─────────────────────────────────────────────────────────────────
    pkgdown-nav-height: 70px

    # ── Typography ─────────────────────────────────────────────────────────────
    # DM Sans — geometric, technical, slightly quirky; pairs well with the
    # spatial/engineering context without feeling corporate.
    # DM Mono — optical sibling of DM Sans, gives code blocks visual harmony.
    base_font:
      google:
        family: DM Sans
        wght:   "300;400;500;600"
    heading_font:
      google:
        family: DM Sans
        wght:   "600;700"
    code_font:
      google:
        family: DM Mono
        wght:   "400;500"

    # ── Spacing & shape ────────────────────────────────────────────────────────
    border-radius:       0.5rem
    border-radius-sm:    0.3rem
    border-radius-lg:    0.75rem
    font-size-base:      1rem
    line-height-base:    1.65

  # Syntax highlighting
  light-switch: true
  theme: a11y-light
  theme-dark: a11y-dark

  # ── Custom CSS  ───────────────────────────────────────────────────
  includes:
    in_header: |
      <style>
      /* ── Navbar ─────────────────────────────────────────────────── */
      .navbar {
        background: #0D1B2A !important;
        border-bottom: 2px solid #0A7EA4;
        letter-spacing: 0.01em;
      }
      .navbar-brand {
        font-weight: 700;
        font-size: 1.15rem;
        color: #ffffff !important;
        letter-spacing: -0.02em;
      }
      .navbar-nav .nav-link {
        color: rgba(255,255,255,0.80) !important;
        font-weight: 500;
        font-size: 0.9rem;
        transition: color 0.15s;
      }
      .navbar-nav .nav-link:hover,
      .navbar-nav .nav-link.active {
        color: #0A7EA4 !important;
      }

      .navbar .text-muted {
        color: rgba(255,255,255,0.60) !important;
      }

      /* ── Vignette TOC ────────────────────────────────────────────── */
      /* Shared structure */
      #toc a,
      #toc .nav-link,
      .bd-toc a,
      .bd-toc .nav-link,
      .bs-docs-sidebar .nav > li > a {
        font-size: 0.85rem;
        border-left: 2px solid transparent;
        padding-left: 0.75rem;
        text-decoration: none;
        transition: border-color 0.15s, color 0.15s;
      }

      /* Light mode (default) */
      #toc,
      #toc .nav,
      .bd-toc,
      .bd-toc .nav {
        --bs-nav-link-color:       #3d5166;
        --bs-nav-link-hover-color: #0A7EA4;
      }
      #toc a,
      #toc .nav-link,
      .bd-toc a,
      .bd-toc .nav-link,
      .bs-docs-sidebar .nav > li > a {
        color: #3d5166 !important;
      }
      #toc a:hover,
      #toc .nav-link:hover,
      #toc .nav-link.active,
      .bd-toc a:hover,
      .bd-toc .nav-link.active,
      .bs-docs-sidebar .nav > li > a:hover,
      .bs-docs-sidebar .nav > li.active > a {
        color: #0A7EA4 !important;
        border-left-color: #0A7EA4;
      }

      /* Dark mode — pkgdown adds data-bs-theme="dark" on <html> */
      [data-bs-theme="dark"] #toc,
      [data-bs-theme="dark"] #toc .nav,
      [data-bs-theme="dark"] .bd-toc,
      [data-bs-theme="dark"] .bd-toc .nav {
        --bs-nav-link-color:       #a8c0d6;
        --bs-nav-link-hover-color: #3dd6f5;
      }
      [data-bs-theme="dark"] #toc a,
      [data-bs-theme="dark"] #toc .nav-link,
      [data-bs-theme="dark"] .bd-toc a,
      [data-bs-theme="dark"] .bd-toc .nav-link,
      [data-bs-theme="dark"] .bs-docs-sidebar .nav > li > a {
        color: #a8c0d6 !important;
      }
      [data-bs-theme="dark"] #toc a:hover,
      [data-bs-theme="dark"] #toc .nav-link:hover,
      [data-bs-theme="dark"] #toc .nav-link.active,
      [data-bs-theme="dark"] .bd-toc a:hover,
      [data-bs-theme="dark"] .bd-toc .nav-link.active,
      [data-bs-theme="dark"] .bs-docs-sidebar .nav > li > a:hover,
      [data-bs-theme="dark"] .bs-docs-sidebar .nav > li.active > a {
        color: #3dd6f5 !important;
        border-left-color: #3dd6f5;
      }

      /* ── Tables ─────────────────────────────────────────────────── */
      .table thead th {
        background: #0D1B2A;
        color: #ffffff;
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        font-weight: 600;
        border: none;
      }
      .table tbody tr:hover { background: #f0f7fb; }
      .table { border-radius: 0.5rem; overflow: hidden; }
      
      </style>

authors:
  Adrián Cidre González:
    href: https://adrian-cidre.com/
  Rafael H. M. Pereira:
    href: https://www.urbandemographics.org/about/
  Egor Kotov:
    href: https://www.ekotov.pro/

# ── Reference index ────────────────────────────────────────────────────────────
reference:

- title: Setup and Connection
  desc: Manage connections with H3 extension
  contents:
  - ddbh3_create_conn

- title: H3 representations
  desc: Converts from/to different H3 representations
  contents:
  - ddbh3_h3_to
  - ddbh3_lonlat_to
  - ddbh3_points_to

- title: H3 hierarchy
  desc: Work with H3 resolutions and parent/child cells
  contents:
  - ddbh3_get_resolution
  - ddbh3_get_n_children
  - ddbh3_get_children
  - ddbh3_get_parent

- title: H3 properties
  desc: Check properties of H3 cell indexes
  contents:
  - ddbh3_is

# ── Navbar ──────────────────────────────────────────────────────────────────────
navbar:
  title: duckh3
  bg: dark
  left:
  - icon: fa-home
    href: index.html
    aria-label: Home
  - text: Reference
    href: reference/index.html
  - text: News
    href: news/index.html
  structure:
    right:
    - search
    - github
    - lightswitch
  components:
    github:
      icon: fa-github
      href: https://github.com/Cidree/duckh3
      aria-label: GitHub

